<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties</title>
    <link rel="stylesheet" href="propertiesStyle.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"/>
</head>
<body>
    <section class="header-info">
      <div class="header-info-left">
        <div class="header-info-mail">
          <i class="fa-solid fa-envelope"></i>
          <p>info@company.com</p>
        </div>
        <div class="header-info-place">
          <i class="fa-solid fa-map"></i>
          <p>Sunny Isles Beach, FL 33160</p>
        </div>
      </div>
      <div class="header-info-icons">
        <a href=""><i class="fa-brands fa-facebook"></i></a>
        <a href=""><i class="fa-brands fa-twitter"></i></a>
        <a href=""><i class="fa-brands fa-linkedin"></i></a>
        <a href=""><i class="fa-brands fa-instagram"></i></a>
      </div>
    </section>

    <header class="head">
      <h1 class="title">VILLA</h1>
      <nav class="main-navbar">
        <ul class="navlinks">
          <li><a href="home.html" class="active">Home</a></li>
          <li><a href="#">Properties</a></li>
          <li><a href="#">Property Details</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </nav>
      <a href="#" class="schedule-button">
        <span class="icon">
          <i class="fa-solid fa-calendar"></i>
        </span>
        <span class="btn">Schedule a Visit</span>
      </a>
    </header>

    <div class="banner">
      <img src="./images/page-heading-bg.jpg" alt="bg">
      <div class="banner-content">
        <p>HOME / PROPERTIES</p>
        <h1>PROPERTIES</h1>
      </div>
    </div>

    <div class="properties-button">
      <button class="active"><a href="#" >Show All</a></button>
      <button><a href="#">Apartment</a></button>
      <button><a href="#">Villa House</a></button>
      <button><a href="#">Penthouse</a></button>
    </div>

</html>
